# SAMS Backend - Multi-Account Configuration
# This file contains configuration for different Azure accounts/environments

# Development Environment
[dev]
subscription_id = ""  # Leave empty to use default
resource_group = "sams-dev-rg"
location = "eastus"
app_name = "sams-backend-dev"
mysql_server = "sams-mysql-dev"
app_service_plan = "sams-plan-dev"
environment = "development"

# Staging Environment
[staging]
subscription_id = ""  # Set your staging subscription ID
resource_group = "sams-staging-rg"
location = "eastus"
app_name = "sams-backend-staging"
mysql_server = "sams-mysql-staging"
app_service_plan = "sams-plan-staging"
environment = "staging"

# Production Environment
[prod]
subscription_id = ""  # Set your production subscription ID
resource_group = "sams-prod-rg"
location = "eastus"
app_name = "sams-backend-prod"
mysql_server = "sams-mysql-prod"
app_service_plan = "sams-plan-prod"
environment = "production"

# Custom Environment (for anshuchoubey123@outlook.com account)
[custom]
subscription_id = ""  # Will be set during deployment
resource_group = "sams-custom-rg"
location = "eastus"
app_name = "sams-backend-custom"
mysql_server = "sams-mysql-custom"
app_service_plan = "sams-plan-custom"
environment = "custom"
account_email = "anshuchoubey123@outlook.com"