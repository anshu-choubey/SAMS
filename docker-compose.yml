version: '3.8'

services:
  sams-backend:
    build: .
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=sams_user
      - MYSQL_PASSWORD=sams_password
      - MYSQL_DATABASE=sams_db
      - MYSQL_PORT=3306
      - JWT_SECRET=your-super-secret-jwt-key-here
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/www/html/logs
    networks:
      - sams-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=sams_db
      - MYSQL_USER=sams_user
      - MYSQL_PASSWORD=sams_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - sams-network

volumes:
  mysql_data:

networks:
  sams-network:
    driver: bridge