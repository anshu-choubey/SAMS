name: Deploy to Azure

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DEPLOYMENT.md'
      - '.gitignore'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: sams-backend
  AZURE_RESOURCE_GROUP: sams-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, mysqli, mbstring, xml, curl, zip

    - name: Install Composer dependencies
      run: |
        composer install --no-dev --optimize-autoloader --no-interaction
        composer dump-autoload --optimize

    - name: Run tests
      run: |
        if [ -f vendor/bin/phpunit ]; then
          vendor/bin/phpunit
        else
          echo "No tests found, skipping..."
        fi

    - name: Setup Node.js for assets (if needed)
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'public/package-lock.json'

    - name: Build assets
      run: |
        if [ -f public/package.json ]; then
          cd public && npm install && npm run build
        else
          echo "No frontend assets to build"
        fi

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        azure-subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: production
        package: .

    - name: Run database migrations (if needed)
      run: |
        # This would run any pending migrations
        # You might need to create a migration script
        echo "Database migrations would run here"

    - name: Health check
      run: |
        sleep 30
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        curl -f $APP_URL/api/public/login.php || exit 1

  performance-test:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Performance test
      run: |
        # Simple performance test
        echo "Running basic performance tests..."
        # Add your performance testing commands here